<!DOCTYPE html>
<html lang="en">
  <!-- ============================================================================= -->
  <!-- Game Developer Portfolio - Main HTML Template                              -->
  <!-- ============================================================================= -->
  <!-- 
    This is the main HTML template for the Game Developer Portfolio website.
    Built with React and optimized for static site deployment on GitHub Pages.
    
    Features:
    - Responsive design for all devices
    - Dark/Light theme support
    - Performance optimized loading
    - Game development focused content
    - SEO optimized meta tags
  -->
  
  <head>
    <!-- ========================================================================= -->
    <!-- Document Metadata & Configuration                                        -->
    <!-- ========================================================================= -->
    
    <!-- Character encoding -->
    <meta charset="utf-8" />
    
    <!-- Favicon and app icons -->
    <link rel="icon" href="/assets/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/images/logo-192.png" />
    
    <!-- Viewport configuration for responsive design -->
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#000000" />
    
    <!-- SEO Meta Description -->
    <meta name="description" content="Game Developer Portfolio - Unity, C#, 2D/3D Game Development, Interactive Experiences" />
    
    <!-- Progressive Web App manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ========================================================================= -->
    <!-- Font Loading & Performance Optimization                                  -->
    <!-- ========================================================================= -->
    
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts - Typography for game developer aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@300;400;500;600&family=Pacifico&family=Source+Sans+Pro:wght@400;600;700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    
    <!-- ========================================================================= -->
    <!-- Page Title & Assets                                                      -->
    <!-- ========================================================================= -->
    
    <!-- SEO optimized page title -->
    <title>Game Developer Portfolio | Unity & C# Specialist</title>
    
    <!-- Main application JavaScript bundle (deferred for better performance) -->
    <script defer="defer" src="/assets/js/app.js"></script>
    
    <!-- Main application CSS styles -->
    <link href="/assets/css/main.css" rel="stylesheet" />
  </head>
  
  <body>
    <!-- ========================================================================= -->
    <!-- Application Root & Fallbacks                                             -->
    <!-- ========================================================================= -->
    
    <!-- Fallback message for users with JavaScript disabled -->
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>This Game Developer Portfolio requires JavaScript to function properly.</p>
        <p>Please enable JavaScript in your browser settings and refresh the page.</p>
      </div>
    </noscript>
    
    <!-- React application mount point -->
    <div id="root">
      <!-- React components will be rendered here -->
    </div>
  </body>
</html>
